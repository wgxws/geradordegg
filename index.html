<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de GG</title>

<style>
*{ box-sizing:border-box; }

body{
    background:#000;
    color:#fff;
    font-family:Arial;
    display:flex;
    justify-content:center;
}

.box{
    width:95%;
    max-width:400px;
    border:2px solid red;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 20px red;
    margin:auto;
}

h1{ text-align:center; }

.status{
    text-align:center;
    color:#aaa;
    margin-bottom:20px;
}

input,select{
    width:100%;
    padding:15px;
    margin:10px 0;
    border-radius:12px;
    border:2px solid red;
    background:#111;
    color:#fff;
    outline:none;
    font-size:15px;
}

input::placeholder{ color:#777; }

/* ðŸ”¥ CORREÃ‡ÃƒO: select apagado */
select{
    color:#777;
}

select:not(:has(option:checked[value=""])) {
    color:#fff;
}

button{
    padding:12px 20px;
    border:none;
    border-radius:20px;
    background:red;
    color:#fff;
    margin:10px 5px;
    box-shadow:0 0 10px red;
}

.botoes{ text-align:center; }

textarea{
    width:100%;
    height:130px;
    margin-top:10px;
    border-radius:10px;
    border:2px solid red;
    background:#000;
    color:#fff;
    padding:8px;
    font-size:14px;

    font-family:monospace;
    line-height:1;
    letter-spacing:0;
}

.dot{
    height:10px;
    width:10px;
    background:red;
    border-radius:50%;
    display:inline-block;
    margin-right:10px;
}
</style>
</head>

<body>

<div class="box">

<h1><span class="dot"></span>Gerador de GG!</h1>

<div id="status" class="status">aguardando...</div>

<input id="bin" placeholder="Início (ex: 374769xxxxxxxx)">
<input id="qtd" placeholder="Quantidade (ex: 10)">
    
<select id="mes">
<option value="" selected>Mês (opcional)</option>
<option value="01">01</option>
<option value="02">02</option>
<option value="03">03</option>
<option value="04">04</option>
<option value="05">05</option>
<option value="06">06</option>
<option value="07">07</option>
<option value="08">08</option>
<option value="09">09</option>
<option value="10">10</option>
<option value="11">11</option>
<option value="12">12</option>
</select>

<select id="ano">
<option value="" selected>Ano (opcional)</option>
<option>2026</option><option>2027</option><option>2028</option>
<option>2029</option><option>2030</option><option>2031</option>
<option>2032</option><option>2033</option><option>2034</option>
<option>2035</option>
</select>

<input id="cvv" placeholder="CVV (opcional)">

<div class="botoes">
<button onclick="gerar()">Gerar</button>
<button onclick="copiar()">Copiar</button>
<button onclick="baixar()">Baixar</button>
</div>

<h3 id="total">Gerados: 0</h3>

<textarea id="resultado"></textarea>

<p style="text-align:center;">Feito por @wgxws</p>

</div>

<script>

function gerar(){
    let bin = document.getElementById("bin").value;
    let qtd = document.getElementById("qtd").value || 10;

    if(!bin){
        alert("Coloque pelo menos o Início!");
        return;
    }

    let lista = "";

    for(let i=0;i<qtd;i++){

        let mes = document.getElementById("mes").value || randomMes();
        let ano = document.getElementById("ano").value || randomAno();
        let cvv = document.getElementById("cvv").value || randomCvv(bin);

        let numero = completar(bin);

        lista += `${numero}|${mes}|${ano}|${cvv}\n`;
    }

    document.getElementById("resultado").value = lista;
    document.getElementById("total").innerText = "Gerados: "+qtd;

    document.getElementById("status").innerHTML = "finalizado ✔️";
}

function completar(bin){
    // troca todos os 'x' por números aleatórios
    let resultado = bin.replace(/x/gi, () => Math.floor(Math.random()*10));

    // completa até 16 dígitos se ainda faltar
    while(resultado.length < 16){
        resultado += Math.floor(Math.random()*10);
    }

    return resultado;
}

function randomMes(){
    return String(Math.floor(Math.random()*12)+1).padStart(2,"0");
}

function randomAno(){
    return Math.floor(Math.random()*10)+2026;
}

function randomCvv(bin){
    bin = bin.replace(/\s/g, "");

    if(bin.startsWith("34") || bin.startsWith("37")){
        return Math.floor(Math.random()*9000) + 1000; // 4 dígitos
    } else {
        return Math.floor(Math.random()*900) + 100; // 3 dígitos
    }
}

function copiar(){
    let texto = document.getElementById("resultado");
    texto.select();
    document.execCommand("copy");
    alert("Copiado!");
}

function baixar(){
    let blob = new Blob([document.getElementById("resultado").value], {type:"text/plain"});
    let a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "cards.txt";
    a.click();
}

</script>

</body>
</html>
